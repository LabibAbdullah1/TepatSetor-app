name: 🚀 Deploy TepatSetor ke cPanel

# ──────────────────────────────────────────────────────────────
# STRATEGI DEPLOYMENT:
#   - Semua file diupload langsung ke root subdomain (tepatstore/)
#   - .htaccess di root redirect semua request ke public/
#   - vendor/ TIDAK diupload — diinstall langsung di server via SSH
#   - node_modules/ TIDAK diupload — assets sudah di-build ke public/build/
#
# Secrets yang diperlukan di GitHub:
#   FTP_SERVER        → hostname FTP cPanel
#   FTP_USERNAME      → username FTP
#   FTP_PASSWORD      → password FTP
#   FTP_PORT          → port FTP (default 21)
#   FTP_SERVER_DIR    → biarkan '/' karena FTP root cPanel sudah di folder subdomain
#   SSH_HOST          → hostname SSH
#   SSH_USERNAME      → username SSH
#   SSH_PRIVATE_KEY   → isi private key SSH (-----BEGIN...-----END)
#   SSH_PASSPHRASE    → passphrase key (boleh kosong)
#   SSH_PORT          → port SSH (default 22)
#   APP_PATH          → path app di server: /home/sublymyi/tepatsetor
# ──────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy ke cPanel
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout kode dari repository
      # ─────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Setup Node.js untuk build frontend
      # ─────────────────────────────────────────
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─────────────────────────────────────────
      # 3. Setup PHP
      # ─────────────────────────────────────────
      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, pdo, pdo_mysql, gd, exif, fileinfo, zip
          coverage: none

      # ─────────────────────────────────────────
      # 4. Install NPM & Build frontend assets
      # ─────────────────────────────────────────
      - name: 📦 Install NPM Dependencies
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Build Frontend Assets
        run: npm run build

      # ─────────────────────────────────────────
      # 5. Upload semua file ke root subdomain via FTP
      #    (vendor/ dan node_modules/ dikecualikan)
      # ─────────────────────────────────────────
      - name: 📤 Deploy ke cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/' }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            **/storage/app/private/**
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/.env
            **/.env.backup
            **/.env.production
            **/phpunit.xml
            **/.phpunit.cache/**
            **/tests/**

      # ─────────────────────────────────────────
      # 6. Jalankan post-deploy commands via SSH:
      #    - composer install di server (tidak perlu upload vendor/)
      #    - artisan migrate, cache, storage:link
      # ─────────────────────────────────────────
      - name: ⚙️ Post-Deploy Commands (via SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          envs: APP_PATH
          script: |
            echo "📂 App path: $APP_PATH"
            cd "$APP_PATH"

            # Install Composer dependencies di server
            composer install --no-dev --optimize-autoloader --no-interaction

            # Buat folder storage yang dibutuhkan Laravel
            mkdir -p storage/framework/views
            mkdir -p storage/framework/cache/data
            mkdir -p storage/framework/sessions
            mkdir -p storage/app/public
            mkdir -p bootstrap/cache

            # Set permissions
            chmod -R 755 storage bootstrap/cache

            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link
            echo "✅ Deploy berhasil!"
        env:
          APP_PATH: ${{ secrets.APP_PATH }}
